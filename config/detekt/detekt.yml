build:
  maxIssues: 0

config:
  validation: true

# Non-negotiable checks that should fail build on new code.
exceptions:
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: true

# Discussable checks: keep visible in baselines/reports, but do not gate new code.
complexity:
  LongMethod:
    active: false
  LongParameterList:
    active: false
  NestedBlockDepth:
    active: false

naming:
  TopLevelPropertyNaming:
    active: false

performance:
  SpreadOperator:
    active: false

style:
  ClassOrdering:
    active: true
  ForbiddenComment:
    active: true
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
    maxLineLength: 140
  NewLineAtEndOfFile:
    active: false
  ProtectedMemberInFinalClass:
    active: false
  ReturnCount:
    active: false
  UnusedPrivateMember:
    active: true
  UnusedPrivateProperty:
    active: true
  UseCheckOrError:
    active: true
  WildcardImport:
    active: true
