name: Merge Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  security:
    uses: ./.github/workflows/security.yml

  build:
    uses: ./.github/workflows/build.yml

  gate-merge:
    name: gate/merge
    if: ${{ always() }}
    needs:
      - quality
      - security
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Validate gate results
        shell: bash
        run: |
          set -euo pipefail

          results='${{ toJson(needs) }}'
          failed="$(jq -r 'to_entries[] | select(.value.result != "success") | "\(.key): \(.value.result)"' <<<"${results}")"

          {
            echo "### Merge gate results"
            jq -r 'to_entries[] | "- \(.key): \(.value.result)"' <<<"${results}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "${failed}" ]]; then
            echo "Merge gate failed:"
            echo "${failed}"
            exit 1
          fi

          echo "Merge gate passed."
