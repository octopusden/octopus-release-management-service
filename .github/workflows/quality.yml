name: Quality Gates

on:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    uses: octopusden/octopus-base/.github/workflows/common-java-gradle-quality-gates.yml@v2.3.3
    with:
      java-version: "21"
      # ORMS excludes :release-management-service:test from quality gate (heavy Spring Boot
       # integration test); everything else is standard qualityCoverage from convention plugin.
      coverage-command: >-
        ./gradlew qualityCoverage
        -x :release-management-service:test
        --no-daemon --stacktrace
