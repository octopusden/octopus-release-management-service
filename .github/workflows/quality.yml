name: Quality Gates

on:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    uses: octopusden/octopus-base/.github/workflows/common-java-gradle-quality-gates.yml@v2.3.0
    with:
      java-version: "21"
      coverage-command: >-
        ./gradlew qualityCoverage
        -x :release-management-service:test
        -x koverVerify
        -x koverCachedVerify
        --no-daemon --stacktrace
